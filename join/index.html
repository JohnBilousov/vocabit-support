<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join on Vocabit</title>
  <style>
    :root { --accent: #3B82F6; --bg: #0b1220; --card: #131c2e; --text: #f8fafc; --muted: #94a3b8; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1e293b, var(--bg)); color: var(--text); padding: 24px; }
    .card { width: 100%; max-width: 420px; background: var(--card); border: 1px solid #24324a;
      border-radius: 24px; padding: 36px 28px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.45); }
    .logo { width: 72px; height: 72px; border-radius: 20px; margin: 0 auto 20px;
      background: linear-gradient(135deg, var(--accent), #22d3ee); display: flex; align-items: center;
      justify-content: center; font-size: 34px; font-weight: 800; color: #fff; }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { color: var(--muted); margin: 0 0 24px; line-height: 1.5; }
    .code { display: inline-block; font-variant-numeric: tabular-nums; letter-spacing: 3px;
      font-size: 26px; font-weight: 700; background: #0e1626; border: 1px dashed #33415c;
      border-radius: 14px; padding: 12px 20px; margin: 0 0 24px; }
    .btn { display: block; width: 100%; padding: 15px; border-radius: 14px; font-size: 16px;
      font-weight: 700; text-decoration: none; margin-bottom: 12px; border: none; cursor: pointer; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid #2b3a54; }
    .hint { font-size: 13px; color: var(--muted); margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">V</div>
    <h1 id="title">Join on Vocabit</h1>
    <p id="subtitle">Opening the app…</p>
    <div class="code" id="code" style="display:none"></div>
    <a class="btn btn-primary" id="openBtn" href="#">Open in Vocabit</a>
    <a class="btn btn-ghost" id="storeBtn" href="https://apps.apple.com/app/id6758019550">Get Vocabit on the App Store</a>
    <p class="hint" id="hint">Don't have the app? Install it, then enter the code above.</p>
  </div>

  <script>
    (function () {
      var APP_ID = "6758019550";
      var STORE = "https://apps.apple.com/app/id" + APP_ID;
      var params = new URLSearchParams(location.search);

      var kinds = [
        { key: "game", scheme: "game", title: "Brain Ring challenge", desc: "Your friend invited you to a Brain Ring match." },
        { key: "room", scheme: "room", title: "Multiplayer room", desc: "Your friend invited you to a multiplayer room." },
        { key: "collection", scheme: "collection-invite", title: "Shared collection", desc: "Your friend shared a Vocabit collection with you." }
      ];

      var found = null, value = null;
      for (var i = 0; i < kinds.length; i++) {
        var v = params.get(kinds[i].key);
        if (v) { found = kinds[i]; value = v; break; }
      }

      var openBtn = document.getElementById("openBtn");
      var storeBtn = document.getElementById("storeBtn");
      openBtn.setAttribute("href", STORE); // safe default

      if (!found) {
        document.getElementById("title").textContent = "Vocabit";
        document.getElementById("subtitle").textContent = "Learn languages with flashcards, games and smart repetition.";
        document.getElementById("hint").style.display = "none";
        return;
      }

      var deepLink = "vocabit://" + found.scheme + "/" + encodeURIComponent(value);
      document.getElementById("title").textContent = found.title;
      document.getElementById("subtitle").textContent = found.desc;
      openBtn.setAttribute("href", deepLink);

      // Show the code (for game/room) so it can be entered manually.
      if (found.key === "game" || found.key === "room") {
        var codeEl = document.getElementById("code");
        codeEl.textContent = value;
        codeEl.style.display = "inline-block";
      }

      // Native "OPEN" banner in iOS Safari that launches the app with this link.
      var meta = document.createElement("meta");
      meta.name = "apple-itunes-app";
      meta.content = "app-id=" + APP_ID + ", app-argument=" + deepLink;
      document.head.appendChild(meta);

      // Try to open the app automatically.
      var now = Date.now();
      setTimeout(function () { window.location.href = deepLink; }, 300);

      // If still here after a moment, the app likely isn't installed → nudge to the Store.
      setTimeout(function () {
        if (Date.now() - now < 2500 && !document.hidden) {
          document.getElementById("subtitle").textContent = "Vocabit didn't open — install it to join.";
        }
      }, 1600);
    })();
  </script>
</body>
</html>
